# =============================================================================
# Development overrides for Minutia (OPT-IN, not auto-loaded)
#
# The default `docker compose up -d` runs the production build (node server.js).
# Load these dev overrides explicitly to get hot reload instead:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# They swap the web container to the Next.js dev server with a source mount and
# expose Postgres on the host for database tools. Never use them in production:
# the dev server is slower, and the exposed Postgres port is unauthenticated
# beyond its password.
# =============================================================================

services:
  minutia-web:
    build:
      context: .
      target: deps
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./next.config.ts:/app/next.config.ts
      - ./tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
    environment:
      - NODE_ENV=development
    command: ["pnpm", "dev"]

  supabase-db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
